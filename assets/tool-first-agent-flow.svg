<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="2020" viewBox="0 0 1400 2020" role="img" aria-labelledby="title desc">
  <title id="title">tool-first-agent workflow and architecture</title>
  <desc id="desc">Readable workflow and architecture diagram for tool-first-agent.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 800 52px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .section { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 800 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 520 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .mono { font: 700 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1f2937; }
      .tiny { font: 650 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .agent { fill: #f8fafc; stroke: #64748b; stroke-width: 2.8; rx: 24; }
      .gate { fill: #e0f2fe; stroke: #0284c7; stroke-width: 3.2; rx: 26; }
      .signals { fill: #eef2ff; stroke: #4f46e5; stroke-width: 3; rx: 26; }
      .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 3.2; }
      .good { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; rx: 24; }
      .warn { fill: #fef3c7; stroke: #d97706; stroke-width: 3; rx: 24; }
      .purple { fill: #f3e8ff; stroke: #9333ea; stroke-width: 3; rx: 24; }
      .record { fill: #ffffff; stroke: #d6deea; stroke-width: 2.4; rx: 24; }
      .arch { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; rx: 26; }
      .data { fill: #f8fafc; stroke: #475569; stroke-width: 2.5; rx: 24; }
      .pill { fill: #111827; rx: 18; }
      .pillText { font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .arrow { stroke: #334155; stroke-width: 4.2; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #64748b; stroke-width: 3.2; fill: none; marker-end: url(#softArrow); stroke-dasharray: 9 8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#334155"/>
    </marker>
    <marker id="softArrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="128%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="1400" height="2020"/>

  <text class="title" x="80" y="86">tool-first-agent 工作流与架构</text>
  <text class="subtitle" x="82" y="128">AI Agent 写脚本前的工具优先门卫：先查成熟工具和历史经验，能用现成工具就不要造轮子。</text>
  <rect class="pill" x="80" y="166" width="258" height="38"/>
  <text class="pillText" x="104" y="191">Core command</text>
  <text class="mono" x="365" y="192">tool-first advise --task "&lt;description&gt;" --json</text>

  <text class="section" x="80" y="278">1. Agent 的工作流</text>

  <rect class="agent" filter="url(#shadow)" x="80" y="322" width="360" height="160"/>
  <text class="label" x="122" y="378">Agent 收到任务</text>
  <text class="body" x="122" y="418">文件 / 数据 / PDF / 图片</text>
  <text class="body" x="122" y="452">搜索 / 压缩 / 开发工具</text>

  <rect class="gate" filter="url(#shadow)" x="520" y="314" width="360" height="176"/>
  <text class="label" x="562" y="370">Tool-First Gate</text>
  <text class="body" x="562" y="412">写代码前先问 tool-first</text>
  <text class="mono" x="562" y="450">advise --task ... --json</text>

  <rect class="signals" filter="url(#shadow)" x="960" y="286" width="360" height="232"/>
  <text class="label" x="1002" y="340">advise 汇总信号</text>
  <text class="body" x="1002" y="382">1. 推断任务类别</text>
  <text class="body" x="1002" y="418">2. 查 registry/tools.yaml</text>
  <text class="body" x="1002" y="454">3. 检测候选工具</text>
  <text class="body" x="1002" y="490">4. 回忆 tool-memory</text>

  <path class="arrow" d="M440 402 H510"/>
  <path class="arrow" d="M880 402 H950"/>

  <polygon class="decision" filter="url(#shadow)" points="535,675 700,570 865,675 700,780"/>
  <text class="label" x="626" y="658">Decision</text>
  <text class="body" x="600" y="700">该怎么行动？</text>
  <path class="arrow" d="M1140 518 C1100 600 960 658 875 672"/>

  <rect class="good" filter="url(#shadow)" x="80" y="884" width="580" height="168"/>
  <text class="label" x="122" y="940">use_existing_tool</text>
  <text class="body" x="122" y="984">直接使用成熟本地工具</text>
  <text class="body" x="122" y="1018">jq / pandoc / ffmpeg / sips / rg</text>

  <rect class="warn" filter="url(#shadow)" x="740" y="884" width="580" height="168"/>
  <text class="label" x="782" y="940">verify_recalled_recipe</text>
  <text class="body" x="782" y="984">复查历史命令是否仍可用</text>
  <text class="body" x="782" y="1018">有效就复用，不重新造轮子</text>

  <rect class="warn" filter="url(#shadow)" x="80" y="1118" width="580" height="168"/>
  <text class="label" x="122" y="1174">tool_known_but_missing</text>
  <text class="body" x="122" y="1218">有匹配工具，但本机缺失</text>
  <text class="body" x="122" y="1252">用 fallback，或询问后安装</text>

  <rect class="purple" filter="url(#shadow)" x="740" y="1118" width="580" height="168"/>
  <text class="label" x="782" y="1174">write_code_allowed</text>
  <text class="body" x="782" y="1218">只有工具不适合时</text>
  <text class="body" x="782" y="1252">才允许写自定义代码</text>

  <path class="arrow" d="M700 780 V848"/>
  <text class="tiny" x="542" y="858">recommendation 输出以下行动之一</text>

  <rect class="record" filter="url(#shadow)" x="260" y="1370" width="880" height="136"/>
  <text class="label" x="326" y="1422">任务完成后，记录可复用经验</text>
  <text class="body" x="326" y="1462">availability / recipe / failure / policy</text>
  <text class="tiny" x="326" y="1492">只记录实际检测或执行过的结果，不写猜测。</text>

  <path class="arrow" d="M700 1286 V1360"/>

  <line x1="80" y1="1586" x2="1320" y2="1586" stroke="#cbd5e1" stroke-width="3"/>

  <text class="section" x="80" y="1648">2. 底层架构与集成方式</text>

  <rect class="arch" filter="url(#shadow)" x="80" y="1690" width="360" height="120"/>
  <text class="label" x="122" y="1740">Rust Runtime</text>
  <text class="body" x="122" y="1778">CLI + MCP + detect</text>

  <rect class="data" filter="url(#shadow)" x="520" y="1690" width="360" height="120"/>
  <text class="label" x="562" y="1740">registry/tools.yaml</text>
  <text class="body" x="562" y="1778">工具候选与命令模板</text>

  <rect class="data" filter="url(#shadow)" x="960" y="1690" width="360" height="120"/>
  <text class="label" x="1002" y="1740">tool-memory</text>
  <text class="body" x="1002" y="1778">共享 JSON 经验记录</text>

  <rect class="data" filter="url(#shadow)" x="80" y="1840" width="360" height="120"/>
  <text class="label" x="122" y="1890">Agent Rules</text>
  <text class="body" x="122" y="1928">每次先过 advise</text>

  <rect class="data" filter="url(#shadow)" x="520" y="1840" width="360" height="120"/>
  <text class="label" x="562" y="1890">MCP Server</text>
  <text class="body" x="562" y="1928">advise_tool_use</text>

  <rect class="data" filter="url(#shadow)" x="960" y="1840" width="360" height="120"/>
  <text class="label" x="1002" y="1890">Codex / Hermes / Claude</text>
  <text class="body" x="1002" y="1928">用统一规则触发工具优先</text>

  <path class="soft" d="M440 1750 H510"/>
  <path class="soft" d="M880 1750 H950"/>
  <path class="soft" d="M700 1810 V1830"/>
</svg>
